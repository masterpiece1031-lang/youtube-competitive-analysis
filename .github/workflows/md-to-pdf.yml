name: Markdown Reports → PDF 自動変換

on:
  push:
    paths:
      - 'reports/**.md'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: 日本語フォントと Chromium をインストール
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk chromium-browser

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: md-to-pdf をインストール
        run: npm install -g md-to-pdf

      - name: Markdown → PDF に変換
        run: |
          for f in reports/*.md; do
            [ -f "$f" ] || continue
            echo "変換中: $f"
            md-to-pdf "$f" \
              --launch-options '{"executablePath":"/usr/bin/chromium-browser","args":["--no-sandbox","--disable-setuid-sandbox"]}' \
              --pdf-options '{"format":"A4","margin":{"top":"20mm","bottom":"20mm","left":"20mm","right":"20mm"}}'
          done

      - name: PDF を commit・push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if compgen -G "reports/*.pdf" > /dev/null; then
            git add reports/*.pdf
            git diff --staged --quiet \
              && echo "変更なし。スキップします。" \
              || (git commit -m "docs: PDF自動生成 [skip ci]" && git push)
          else
            echo "PDFファイルが見つかりませんでした。変換をスキップします。"
          fi
